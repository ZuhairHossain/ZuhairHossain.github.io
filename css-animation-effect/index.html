<!DOCTYPE html>
<html lang="en">
<head>
    <title>CSS Animation Effect</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <audio controls loop autoplay height="0" width="0">
        <source src="ukulele.mp3" type="audio/mp3" />
      </audio>
    <div class="container">
        <div class="infinite">
            <div class="shadow"></div>
        </div>
        <div class="box">
            <div class="square"></div>
        </div>
    </div>
</body>
</html>
