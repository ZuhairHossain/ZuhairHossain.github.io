<!DOCTYPE html>
<html lang="en">
<head>
    <title>CSS Animation Effect</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div style="visibility:hidden">
        <audio autoplay loop>
            <source src="ukulele.mp3">
        </audio> 
    </div>
    <div class="container">
        <div class="infinite">
            <div class="shadow"></div>
        </div>
        <div class="box">
            <div class="square"></div>
        </div>
    </div>
</body>
</html>
